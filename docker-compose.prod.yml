# Compose-only production-style stack. Copy env.prod.example to .env.prod and set secrets + hosts.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-studentcloud}
      POSTGRES_USER: ${POSTGRES_USER:-studentcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-studentcloud} -d ${POSTGRES_DB:-studentcloud}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  traefik:
    image: traefik:v3.2
    command:
      - --entrypoints.web.address=:80
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      - --log.level=INFO
    ports:
      - '80:80'
    volumes:
      - traefik_dynamic:/dynamic:ro
    depends_on:
      - web

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py regenerate_traefik_routes &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - traefik_dynamic:/app/data/traefik/dynamic
    expose:
      - '8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A core.celery worker -l INFO
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - traefik_dynamic:/app/data/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    command: celery -A core.celery beat -l INFO
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - traefik_dynamic:/app/data/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata: {}
  sites_data: {}
  uploads_data: {}
  traefik_dynamic: {}
