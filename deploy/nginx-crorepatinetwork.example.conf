# =============================================================================
# Nginx — https://crorepatinetwork.com/ + student apps *.apps.crorepatinetwork.com
# =============================================================================
# Prereq (Docker / .env.prod):
#   WEB_HTTP_BIND=127.0.0.1
#   WEB_HTTP_PUBLISH=9898
# so Gunicorn is ONLY http://127.0.0.1:9898 (not exposed on 0.0.0.0).
#
# Traefik (student static routes) — match TRAEFIK_HTTP_PUBLISH in .env.prod (9080 below).
#
# TLS: use Let's Encrypt (certbot) or Cloudflare Origin Certificate paths below.
#
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream sd_pass_gunicorn {
    server 127.0.0.1:9898;
    keepalive 8;
}

upstream sd_pass_traefik {
    server 127.0.0.1:9080;
    keepalive 4;
}

# --- Dashboard + marketing apex (adjust server_name if you use only a subdomain) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crorepatinetwork.com www.crorepatinetwork.com;

    ssl_certificate     /etc/letsencrypt/live/crorepatinetwork.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crorepatinetwork.com/privkey.pem;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}

# --- Student platform: Host must reach Traefik for routing to Gunicorn ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apps.crorepatinetwork.com *.apps.crorepatinetwork.com;

    ssl_certificate     /etc/letsencrypt/live/crorepatinetwork.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crorepatinetwork.com/privkey.pem;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}

# --- HTTP → HTTPS (optional; Cloudflare may already force HTTPS) ---
server {
    listen 80;
    listen [::]:80;
    server_name crorepatinetwork.com www.crorepatinetwork.com apps.crorepatinetwork.com *.apps.crorepatinetwork.com;
    return 301 https://$host$request_uri;
}
