# Compose-only production-style stack. Copy env.prod.example to .env.prod and set secrets + hosts.
#
# Commands: always pass --env-file .env.prod OR symlink/copy secrets into a file named `.env`
# in this directory (Compose auto-loads `.env` for ${VAR} substitution — needed for `down`).
#
# Traefik HTTP port defaults to 9080; HTTPS (websecure) port defaults to 9443.
# nginx stream-proxies unknown SNI (custom student domains) on :443 to Traefik :9443 for ACME certs.
# Gunicorn is published as WEB_HTTP_BIND:WEB_HTTP_PUBLISH -> container :8000 (default 0.0.0.0:9898).
# Set ACME_EMAIL to your admin address for Let's Encrypt registration.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-studentcloud}
      POSTGRES_USER: ${POSTGRES_USER:-studentcloud}
      # No :? here so `docker compose down` works without env; MUST set a strong password in .env.prod before up.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-studentcloud} -d ${POSTGRES_DB:-studentcloud}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  flask-runner:
    build:
      context: ./flask_runner
      dockerfile: Dockerfile
    environment:
      STUDENT_SITE_ROOT: /app/data/sites
      FLASK_RUNNER_TOKEN: ${FLASK_RUNNER_TOKEN:-}
      GUNICORN_TIMEOUT: '30'
      PIP_TIMEOUT: '180'
    volumes:
      - sites_data:/app/data/sites
    restart: unless-stopped
    depends_on:
      - web

  traefik:
    image: traefik:v3.2
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      - --log.level=INFO
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-webmaster@localhost}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - '${TRAEFIK_HTTP_PUBLISH:-9080}:80'
      - '${TRAEFIK_HTTPS_PUBLISH:-9443}:443'
    volumes:
      - traefik_dynamic:/dynamic:ro
      - traefik_acme:/acme
    depends_on:
      - web

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py regenerate_traefik_routes &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --worker-class gthread --timeout 120 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --preload"
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - platform_backups_data:/app/data/platform_backups
      - traefik_dynamic:/app/data/traefik/dynamic
      # Live templates from host — after git pull, restart web (no rebuild for .jinja-only changes)
      - ./templates:/app/templates:ro
    ports:
      - '${WEB_HTTP_BIND:-0.0.0.0}:${WEB_HTTP_PUBLISH:-9898}:8000'
    expose:
      - '8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A core.celery worker -l INFO
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - platform_backups_data:/app/data/platform_backups
      - traefik_dynamic:/app/data/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    command: celery -A core.celery beat -l INFO
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - traefik_dynamic:/app/data/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata: {}
  sites_data: {}
  uploads_data: {}
  platform_backups_data: {}
  traefik_dynamic: {}
  traefik_acme: {}
