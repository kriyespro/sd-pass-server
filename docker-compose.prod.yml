# Compose-only production-style stack. Copy env.prod.example to .env.prod and set secrets + hosts.
#
# Commands: always pass --env-file .env.prod OR symlink/copy secrets into a file named `.env`
# in this directory (Compose auto-loads `.env` for ${VAR} substitution — needed for `down`).
#
# Traefik host port defaults to 9080 so host nginx can keep :80. Override with TRAEFIK_HTTP_PUBLISH.
# Gunicorn is published as WEB_HTTP_BIND:WEB_HTTP_PUBLISH -> container :8000 (default 0.0.0.0:9898).
# With nginx + TLS on host port 9898: set WEB_HTTP_BIND=127.0.0.1 and WEB_HTTP_PUBLISH=9988, then nginx
# proxies https://...:9898 -> http://127.0.0.1:9988. See deploy/nginx-studentcloud.example.conf.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-studentcloud}
      POSTGRES_USER: ${POSTGRES_USER:-studentcloud}
      # No :? here so `docker compose down` works without env; MUST set a strong password in .env.prod before up.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-studentcloud} -d ${POSTGRES_DB:-studentcloud}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  traefik:
    image: traefik:v3.2
    command:
      - --entrypoints.web.address=:80
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      - --log.level=INFO
    ports:
      - '${TRAEFIK_HTTP_PUBLISH:-9080}:80'
    volumes:
      - traefik_dynamic:/dynamic:ro
    depends_on:
      - web

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py regenerate_traefik_routes &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - traefik_dynamic:/app/data/traefik/dynamic
    ports:
      - '${WEB_HTTP_BIND:-0.0.0.0}:${WEB_HTTP_PUBLISH:-9898}:8000'
    expose:
      - '8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A core.celery worker -l INFO
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - traefik_dynamic:/app/data/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    command: celery -A core.celery beat -l INFO
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    volumes:
      - sites_data:/app/data/sites
      - uploads_data:/app/data/uploads
      - traefik_dynamic:/app/data/traefik/dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata: {}
  sites_data: {}
  uploads_data: {}
  traefik_dynamic: {}
