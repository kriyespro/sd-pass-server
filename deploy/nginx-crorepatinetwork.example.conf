# =============================================================================
# Nginx — https://crorepatinetwork.com/ + student apps *.crorepatinetwork.com
# =============================================================================
# NOTE: Add this gzip block to /etc/nginx/nginx.conf inside the http {} block
# (only once — not here, to avoid "duplicate directive" errors):
#
#   gzip on;
#   gzip_vary on;
#   gzip_proxied any;
#   gzip_comp_level 5;
#   gzip_min_length 1024;
#   gzip_types text/plain text/css text/javascript application/javascript
#              application/json image/svg+xml font/woff font/woff2;
#
# Prereq (.env.prod):
#   WEB_HTTP_BIND=127.0.0.1
#   WEB_HTTP_PUBLISH=9898
#   STUDENT_APPS_BASE_DOMAIN=crorepatinetwork.com
#   TRAEFIK_HTTP_PUBLISH=9080
#
# Cloudflare free plan wildcard cert covers *.crorepatinetwork.com (one level).
# Student sites are therefore served at {subdomain}.crorepatinetwork.com.
# The first server block (apex + www) takes priority over the wildcard block.
#
# Cloudflare DNS: add an A wildcard record (* → server IP, orange cloud).
# Cloudflare SSL/TLS → Full (strict) with the Origin Certificate below.
#
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream sd_pass_gunicorn {
    server 127.0.0.1:9898;
    keepalive 16;
}

upstream sd_pass_traefik {
    server 127.0.0.1:9080;
    keepalive 8;
}

# --- Dashboard: apex + www (must come BEFORE the wildcard block) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crorepatinetwork.com www.crorepatinetwork.com;

    ssl_certificate     /etc/ssl/cloudflare/crorepatinetwork.pem;
    ssl_certificate_key /etc/ssl/cloudflare/crorepatinetwork.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }
}

# --- Student platform: any other *.crorepatinetwork.com subdomain → Traefik ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.crorepatinetwork.com;

    ssl_certificate     /etc/ssl/cloudflare/crorepatinetwork.pem;
    ssl_certificate_key /etc/ssl/cloudflare/crorepatinetwork.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}

# --- Custom student domains (Cloudflare Full mode → origin HTTPS with default cert) ---
# Catches any hostname not matched above. Students point their A record → this IP,
# Cloudflare proxies in Full mode (validates origin cert loosely). Traefik routes
# the Host to the correct student project.
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # Re-use the Cloudflare Origin cert as default. Cloudflare Full (not strict)
    # accepts any cert from origin. Students set Cloudflare SSL → Full on their domain.
    ssl_certificate     /etc/ssl/cloudflare/crorepatinetwork.pem;
    ssl_certificate_key /etc/ssl/cloudflare/crorepatinetwork.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}

# --- HTTP → HTTPS (own platform domains) ---
server {
    listen 80;
    listen [::]:80;
    server_name crorepatinetwork.com www.crorepatinetwork.com *.crorepatinetwork.com;
    return 301 https://$host$request_uri;
}

# --- HTTP catch-all for custom student domains (Cloudflare Flexible fallback) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://sd_pass_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}
