# =============================================================================
# Nginx in front of Docker Gunicorn (StudentCloud / sd-pass-server)
# =============================================================================
# Problem: Gunicorn is plain HTTP. You cannot bind BOTH nginx and Docker on the
# same host port (e.g. 9898). Fix:
#
#   1) In .env.prod set:
#        WEB_HTTP_BIND=127.0.0.1
#        WEB_HTTP_PUBLISH=9988
#      so Gunicorn is ONLY on http://127.0.0.1:9988 (not public).
#
#   2) Install this snippet (Debian/Ubuntu: /etc/nginx/sites-available/ then
#      ln -s into sites-enabled/). Adjust paths to your TLS cert/key.
#
#   3) In .env.prod for Django behind HTTPS (nginx sets X-Forwarded-Proto):
#        SECURE_SSL_REDIRECT=False
#        SESSION_COOKIE_SECURE=True
#        CSRF_COOKIE_SECURE=True
#        SECURE_PROXY_SSL=True
#        USE_X_FORWARDED_HOST=True
#        CSRF_TRUSTED_ORIGINS=https://62.72.43.194:9898
#        ALLOWED_HOSTS=62.72.43.194,127.0.0.1,localhost
#
#   4) Self-signed cert for IP (browsers will warn until you use a real domain + LE):
#        sudo mkdir -p /etc/nginx/ssl
#        sudo openssl req -x509 -nodes -days 825 -newkey rsa:2048 \
#          -keyout /etc/nginx/ssl/sd-pass.key \
#          -out /etc/nginx/ssl/sd-pass.crt \
#          -subj "/CN=62.72.43.194"
#
#   5) nginx -t && systemctl reload nginx
# =============================================================================

upstream sd_pass_gunicorn {
    server 127.0.0.1:9988;
    keepalive 8;
}

# HTTPS on 9898 — nginx owns this port; Docker listens on 127.0.0.1:9988 only.
server {
    listen 9898 ssl http2;
    listen [::]:9898 ssl http2;
    server_name 62.72.43.194;

    ssl_certificate     /etc/nginx/ssl/sd-pass.crt;
    ssl_certificate_key /etc/nginx/ssl/sd-pass.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}

# Optional: HTTP on another port → redirect to HTTPS :9898 (only if nothing else uses 8089)
# server {
#     listen 8089;
#     return 301 https://$host:9898$request_uri;
# }
