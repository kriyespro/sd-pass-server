# =============================================================================
# Nginx — https://crorepatinetwork.com/ + student apps *.crorepatinetwork.com
# + custom student domains (HTTPS via Traefik ACME / Let's Encrypt)
# =============================================================================
#
# Architecture:
#   Port 443 → nginx stream (SNI-based):
#     *.crorepatinetwork.com  → nginx http block on internal port 4431 (Cloudflare Origin cert)
#     custom student domains  → Traefik websecure :9443 (Let's Encrypt certs)
#   Port 80  → nginx http (platform redirect) / Traefik web :9080 (ACME challenge + custom domains)
#
# Prereq (.env.prod):
#   WEB_HTTP_BIND=127.0.0.1
#   WEB_HTTP_PUBLISH=9898
#   STUDENT_APPS_BASE_DOMAIN=apps.crorepatinetwork.com
#   TRAEFIK_HTTP_PUBLISH=9080
#   TRAEFIK_HTTPS_PUBLISH=9443
#   TRAEFIK_CUSTOM_DOMAIN_TLS=true
#   ACME_EMAIL=admin@crorepatinetwork.com
#
# Step 1: Add the stream {} block to /etc/nginx/nginx.conf (top-level, NOT inside http {})
# Step 2: Install this file to /etc/nginx/sites-available/ and symlink to sites-enabled/
# Step 3: sudo nginx -t && sudo systemctl reload nginx
#
# stream module is built-in to nginx.org packages; for distro nginx:
#   check /etc/nginx/modules-enabled/ for ngx_stream_module.so
# =============================================================================

# ── Add this to /etc/nginx/nginx.conf (inside the main {} block, outside http {}) ──
# stream {
#     log_format stream '$remote_addr [$time_local] $ssl_preread_server_name → $upstream';
#
#     map $ssl_preread_server_name $ssl_backend {
#         ~^(.*\.)?crorepatinetwork\.com$  127.0.0.1:4431;   # nginx http block (Cloudflare cert)
#         default                          127.0.0.1:9443;   # Traefik websecure (Let's Encrypt)
#     }
#
#     server {
#         listen 443;
#         listen [::]:443;
#         ssl_preread on;
#         proxy_pass $ssl_backend;
#         proxy_connect_timeout 5s;
#         proxy_timeout 300s;
#     }
# }
# ── End of stream block ──

upstream sd_pass_gunicorn {
    server 127.0.0.1:9898;
    keepalive 16;
}

upstream sd_pass_traefik {
    server 127.0.0.1:9080;
    keepalive 8;
}

# --- Dashboard: apex + www (internal HTTPS on 4431, reached via stream SNI) ---
server {
    listen 4431 ssl http2;
    listen [::]:4431 ssl http2;
    server_name crorepatinetwork.com www.crorepatinetwork.com;

    ssl_certificate     /etc/ssl/cloudflare/crorepatinetwork.pem;
    ssl_certificate_key /etc/ssl/cloudflare/crorepatinetwork.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }
}

# --- Student platform: *.crorepatinetwork.com → Traefik (internal HTTPS on 4431) ---
server {
    listen 4431 ssl http2;
    listen [::]:4431 ssl http2;
    server_name *.crorepatinetwork.com;

    ssl_certificate     /etc/ssl/cloudflare/crorepatinetwork.pem;
    ssl_certificate_key /etc/ssl/cloudflare/crorepatinetwork.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://sd_pass_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}

# --- HTTP → HTTPS redirect for platform domains ---
server {
    listen 80;
    listen [::]:80;
    server_name crorepatinetwork.com www.crorepatinetwork.com *.crorepatinetwork.com;
    return 301 https://$host$request_uri;
}

# --- HTTP catch-all: custom student domains and ACME HTTP-01 challenges → Traefik ---
# Traefik handles /.well-known/acme-challenge/ for Let's Encrypt and redirects HTTP→HTTPS
# for verified custom student domains.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://sd_pass_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}
