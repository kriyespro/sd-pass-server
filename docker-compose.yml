services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studentcloud
      POSTGRES_USER: studentcloud
      POSTGRES_PASSWORD: studentcloud
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U studentcloud -d studentcloud']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  traefik:
    image: traefik:v3.2
    command:
      - --entrypoints.web.address=:80
      - --providers.file.directory=/dynamic
      - --providers.file.watch=true
      - --log.level=INFO
    ports:
      - "80:80"
    volumes:
      - ./data/traefik/dynamic:/dynamic:ro
    depends_on:
      - web

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py regenerate_traefik_routes &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      SECRET_KEY: dev-docker-change-me
      DATABASE_URL: postgres://studentcloud:studentcloud@db:5432/studentcloud
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: 'false'
      TRAEFIK_UPSTREAM_URL: http://web:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A core.celery worker -l INFO
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      SECRET_KEY: dev-docker-change-me
      DATABASE_URL: postgres://studentcloud:studentcloud@db:5432/studentcloud
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: 'false'
      TRAEFIK_UPSTREAM_URL: http://web:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    command: celery -A core.celery beat -l INFO
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      SECRET_KEY: dev-docker-change-me
      DATABASE_URL: postgres://studentcloud:studentcloud@db:5432/studentcloud
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: 'false'
      TRAEFIK_UPSTREAM_URL: http://web:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
