# =============================================================================
# Nginx — krizn.com (Cloudflare proxied) + *.krizn.com student apps
# Server: 159.195.52.197
# SSL mode: Cloudflare Full (Strict) with Origin cert
# =============================================================================
#
# Setup steps:
# 1. Cloudflare dashboard → SSL/TLS → set mode to "Full (Strict)"
# 2. Cloudflare dashboard → SSL/TLS → Origin Server → Create Certificate
#    - Hostnames: krizn.com, *.krizn.com
#    - Expiry: 15 years
#    - Download: PEM format
# 3. On server:
#      sudo mkdir -p /etc/ssl/cloudflare
#      # paste certificate → /etc/ssl/cloudflare/krizn.pem
#      # paste private key  → /etc/ssl/cloudflare/krizn.key
#      sudo chmod 600 /etc/ssl/cloudflare/krizn.key
# 4. Copy this file to /etc/nginx/sites-available/krizn.conf
# 5. rm /etc/nginx/sites-enabled/default
#    ln -s /etc/nginx/sites-available/krizn.conf /etc/nginx/sites-enabled/krizn.conf
# 6. nginx -t && systemctl reload nginx
#
# .env.prod must have:
#   WEB_HTTP_BIND=127.0.0.1
#   WEB_HTTP_PUBLISH=9898
#   TRAEFIK_HTTP_PUBLISH=9080
# =============================================================================

upstream krizn_gunicorn {
    server 127.0.0.1:9898;
    keepalive 16;
}

upstream krizn_traefik {
    server 127.0.0.1:9080;
    keepalive 8;
}

# --- Dashboard: krizn.com + www ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name krizn.com www.krizn.com;

    ssl_certificate     /etc/ssl/cloudflare/krizn.pem;
    ssl_certificate_key /etc/ssl/cloudflare/krizn.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://krizn_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }
}

# --- Student apps: *.krizn.com → Traefik ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.krizn.com;

    ssl_certificate     /etc/ssl/cloudflare/krizn.pem;
    ssl_certificate_key /etc/ssl/cloudflare/krizn.key;

    client_max_body_size 200m;

    location / {
        proxy_pass http://krizn_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name krizn.com www.krizn.com *.krizn.com;
    return 301 https://$host$request_uri;
}

# --- HTTP catch-all: Traefik ACME + custom student domains ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://krizn_traefik;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }
}
